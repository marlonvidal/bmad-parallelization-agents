# <!-- Powered by BMAD™ Core -->
# BMAD Core Configuration - Example with Jira Integration
# Copy this file to your project's .bmad-core/core-config.yaml and customize

markdownExploder: true

# QA Configuration
qa:
  qaLocation: docs/qa

# PRD Configuration
prd:
  prdFile: docs/prd.md
  prdVersion: v4
  prdSharded: true
  prdShardedLocation: docs/prd
  epicFilePattern: epic-{n}*.md

# Architecture Configuration
architecture:
  architectureFile: docs/architecture.md
  architectureVersion: v4
  architectureSharded: true
  architectureShardedLocation: docs/architecture

# Custom Technical Documents (optional)
customTechnicalDocuments: null

# Developer Configuration
devLoadAlwaysFiles:
  - docs/architecture/coding-standards.md
  - docs/architecture/tech-stack.md
  - docs/architecture/source-tree.md
devDebugLog: .ai/debug-log.md
devStoryLocation: docs/stories

# Slash Command Prefix
slashPrefix: BMad

# Jira Integration (OPTIONAL - requires Jira MCP configuration)
# See JIRA-SETUP.md for complete setup instructions
jira:
  # Auto-detect Jira MCP from ~/.cursor/mcp.json
  # Set to false to disable Jira integration entirely
  enabled: auto-detect
  
  # Your Jira project key (e.g., "PROJ", "MYAPP", "DEV")
  # Find this in Jira: Project Settings → Details → Key
  # Or look at any issue key (e.g., PROJ-123 → key is "PROJ")
  projectKey: null  # REQUIRED: Replace with your project key (e.g., "PROJ")
  
  # Your Jira base URL (used for generating links)
  # Jira Cloud: https://your-company.atlassian.net
  # Jira Server: https://jira.your-company.com
  baseUrl: null  # REQUIRED: Replace with your Jira URL
  
  # Mapping file location (tracks BMAD ↔ Jira relationships)
  # This file is auto-generated by *sync-to-jira command
  # Add to .gitignore if you don't want to track Jira IDs
  mappingFile: .bmad-core/data/jira-mapping.yaml
  
  # Jira issue type mappings
  # Customize these to match your Jira project's issue types
  # Check: Project Settings → Issue Types in Jira
  issueTypes:
    epic: Epic        # PRD Epic → Jira Epic
    story: Story      # PRD Story → Jira Story
    task: Task        # Story Tasks → Jira Task
  
  # Optional: Default assignee for created issues
  # Leave null to create unassigned issues
  defaultAssignee: null
  
  # Optional: Labels to add to all synced issues
  # Example: ["bmad", "ai-generated"]
  labels: []
